<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Project</title>
  <style>
    /* 
    Write your CSS here 
    Gap Colour: #000
    White: #F0F1EC
    Red: #E72F24
    Black: #232629
    Blue: #004592
    Yellow: #F9D01E

    For dimensions, see dimensions.png image.
    HINT: Remember you can't change the properties of grid lines.
    But grid lines are transparent!
    */
    .parent {
      display: grid;
      width: fit-content;
      background-color: black;
      grid-template-columns: 320px 198px 153px 50px;
      grid-template-rows: 414px 130px 155px 20px;
      gap:9px;
    }

    .div1 { grid-area: 2 / 2 / 4 / 4; background-color: #f0f1eb;}
    .div2 { grid-area: 2 / 4 / 3 / 5; background-color: #004592; border-bottom: 10px solid black;}
    .div3 { grid-area: 3 / 4 / 5 / 5; background-color: #f0f1eb;}
    .div4 { grid-area: 4 / 3 / 5 / 4; background-color: #232629;}
    .div5 { grid-area: 4 / 2 / 5 / 3; background-color: #f8d01f;}
    .div6 { grid-area: 4 / 1 / 5 / 2; background-color: #f0f1eb;}
    .div7 { grid-area: 2 / 1 / 4 / 2; background-color: #f0f1eb;}
    .div8 { grid-area: 1 / 1 / 2 / 2; background-color: #e72f24;}
    .div9 { grid-area: 1 / 2 / 2 / 5; background-color: #f0f1eb;}
  </style>
</head>

<body>
  <div class="parent">
    <div class="div1"> </div>
    <div class="div2"> </div>
    <div class="div3"> </div>
    <div class="div4"> </div>
    <div class="div5"> </div>
    <div class="div6"> </div>
    <div class="div7"> </div>
    <div class="div8"> </div>
    <div class="div9"> </div>
  </div>
</body>

</html>
