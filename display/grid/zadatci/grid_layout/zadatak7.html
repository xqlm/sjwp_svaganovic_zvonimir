<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .container{
            width: stretch;
            height: 100%;
            scale: 0.95;
            padding: 1rem 1.5rem;
            border: 2px solid hsl(0, 0%, 75%);
            display: grid;
            grid-template-rows: 1fr 1fr 1fr 1fr;
            grid-template-columns: auto repeat(3, 1fr);
            gap: 1rem;
        }
        .item{
            width: stretch;
            height: stretch;
            background-color: hsl(0, 0%, 30%);
            border-radius: 2rem;
            padding: 0 1rem;
            display: flex;
            justify-content: start;
            align-items: center;
        }
        .a{
            grid-column: span 4; 
            background-color: hsl(0, 0%, 50%);
        }
        .b{
            align-items: start;
        }
        .b p{ margin: 1rem 0; }
        .c{
            grid-column: span 3;
            justify-content: start;
            align-items: start;
            flex-direction: column;
        }
        .c #p1{
            margin: 1rem 0 0.5rem 0;
        }
        .c #p2{
            margin: 0.5rem 0;
        }
        .d{
            grid-column: span 4; 
            background-color: hsl(0, 0%, 70%);
        }
        .d p{ color: hsl(0, 0%, 20%);}
        .e{
            grid-column: span 4; 
            background-color: hsl(0, 0%, 50%);
        }
        p{
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 3rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item a"><p>Header</p></div>
        <div class="item b"><p>Sidebar</p></div>
        <div class="item c"><p id="p1">Content</p><p id="p2">Lorem ipsum dolor sit amet consectetur adipisicing elit. Eius molestias quod a corporis veniam error quasi.</p></div>
        <div class="item d"><p>Sidebar 2</p></div>
        <div class="item e"><p>Footer</p></div>
    </div>
</body>
</html>
