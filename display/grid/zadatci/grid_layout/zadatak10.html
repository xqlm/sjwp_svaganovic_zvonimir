<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .container{
            width: stretch;
            height: stretch;
            scale: 0.95;
            padding: 1rem 1.5rem;
            border: 5px solid #75b5c8;
            display: grid;
            grid-template-rows: repeat(4, 1fr);
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        .item{
            width: stretch;
            height: stretch;
            border: 3px solid #f1b25f;
            border-radius: 0.5rem;
            background-color: #fcbf74aa;
            font-size: 2rem;
            color: #e34216;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item a1" style="grid-row:  1/1; grid-column:  1/3">One</div>
        <div class="item a2" style="grid-row:  1/3; grid-column:  2/4">Two</div>
        <div class="item a3" style="grid-row:  span 3; grid-column:  span 1">Three</div>
        <div class="item a4" style="grid-row:  3/4; grid-column:  3/4">Four</div>
        <div class="item a5" style="grid-row:  4/5; grid-column:  2/3">Five</div>
        <div class="item a6" style="grid-row:  4/5; grid-column:  3/4">Six</div>
    </div>
</body>
</html>
