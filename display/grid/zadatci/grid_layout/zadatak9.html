<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100dvh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            width: stretch;
            height: 50%;
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 2rem;
        }
        .item{
            width: stretch;
            height: stretch;
            display: flex;
            justify-content: start;
            align-items: center;
            color: white;
            background-color: hsl(0, 0%, 30%);
            border-radius: 2rem;
            padding-left: 1rem;
            font-size: 3rem;
        }
        .d{
            grid-column: 2 / 5; 
            grid-row: 2;
        }
        .f{
            grid-column: 3 / 6; 
            grid-row: 2; 
            background-color: rgba(0, 160, 255, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item a" style="grid-column: span 2;">A</div>
        <div class="item b" style="grid-column: span 3;">B</div>
        <div class="item c">C</div>
        <div class="item d">D</div>
        <div class="item e" style="grid-column: span 5;">E</div>
        <div class="item f">F</div>
    </div>
</body>
</html>
