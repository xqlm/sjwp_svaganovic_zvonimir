<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100dvh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            width: stretch;
            height: 50%;
            padding: 2rem;
            display: grid;
            grid-template-rows: repeat(2, 1fr);
            grid-template-columns: repeat(6, 1fr);
            gap: 2rem;
        }
        .item{
            display: flex;
            justify-content: start;
            align-items: center;
            border-radius: 2rem;
            padding-left: 1rem;
            font-size: 3rem;
        }
        .a1, .a3, .a5, .a7, .a9, .a11{
            color: white;
            background-color: hsl(0, 0%, 20%);
        }
        .a2, .a4, .a6, .a8, .a10, .a12{
            background-color: hsl(0, 0%, 75%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item a1">1</div>
        <div class="item a2">2</div>
        <div class="item a3">3</div>
        <div class="item a4">4</div>
        <div class="item a5">5</div>
        <div class="item a6">6</div>
        <div class="item a7">7</div>
        <div class="item a8">8</div>
        <div class="item a9">9</div>
        <div class="item a10">10</div>
        <div class="item a11">11</div>
        <div class="item a12">12</div>
    </div>
</body>
</html>
