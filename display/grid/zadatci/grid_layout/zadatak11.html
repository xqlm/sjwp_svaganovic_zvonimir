<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100dvh;
            background-color: #2b2e56;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .container{
            width: stretch;
            height: stretch;
            scale: 0.95;
            padding: 1rem;
            display: grid;
            grid-template-rows: repeat(3, 1fr);
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
        }
        .item{
            width: stretch;
            height: stretch;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item a1" style="grid-row: span 3; grid-column: span 1; background-color: #6dbe4f;"></div>
        <div class="item a2" style="grid-row: span 1; grid-column: span 2; background-color: #6dbe4f;"></div>
        <div class="item a3" style="grid-row: span 1; grid-column: span 1; background-color: #ec3437;"></div>
        <div class="item a4" style="grid-row: span 1; grid-column: span 1; background-color: #fbb22f;"></div>
        <div class="item a5" style="grid-row: span 1; grid-column: span 1; background-color: #ec3437;"></div>
        <div class="item a6" style="grid-row: span 2; grid-column: span 1; background-color: #6dbe4f;"></div>
        <div class="item a7" style="grid-row: span 1; grid-column: span 1; background-color: #ec3437;"></div>
        <div class="item a8" style="grid-row: span 1; grid-column: span 1; background-color: #fbb22f;"></div>
    </div>
</body>
</html>
