<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudoklase</title>
    <style>
        a:link{
            color: red;
        }
        a:visited{
            color: green;
        }
        a:hover{
            color: hotpink;
        }
        a:active{
            color: blueviolet;
        }
        div:hover{
            transform: scale(90%);
        }
    </style>
</head>
<body>
    <a href="https://www.posta.hr" target="_blank">Pošta RH</a>
    <a href="https://shipnow.dhl.com" target="_blank">DHL</a>
    <div style="width: 100px; height: 100px; background-color: blue;"></div>
</body>
</html>
