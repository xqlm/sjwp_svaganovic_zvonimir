<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformacije</title>
    <style>
        div {
            width: 100px;
            height: 100px;
            background-color: blueviolet;
        }
        .d1{
            transform: translate(200px, 0px);
            background-color: blue;
        }
        .d2{
            transform: rotate(45deg);
            background-color: red;
        }
        .d3{
            transform: scale(0.5);
            background-color: blueviolet;
        }
        .d4{
            transform: skew(15deg);
        }
    </style>
</head>
<body>
    <ol>
        <li>
            <p style="color: blue;">translate</p>
            <div class="d1"></div>
        </li>
        <li>
            <p style="color: red;">rotate</p>
            <div class="d2"></div>
        </li>
        <li>
            <p style="color: blueviolet;">scale</p>
            <div class="d3"></div>
        </li>
        <li>
            <p style="color: cadetblue">skew</p>
            <div class="d4"></div>
        </li>
    </ol>
</body>
</html>
