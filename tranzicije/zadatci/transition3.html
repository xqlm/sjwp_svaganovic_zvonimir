<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .tata {
            display: flex;
            justify-content: center;
            width: 400px;
            height: 400px;
        }
        .container {
            position: absolute;
            width: 400px;
            height: 400px;
            display: flex;
            flex-wrap: wrap;
        }
        .d1, .d2, .d3, .d4 {
            width: 200px;
            height: 200px;
        }
        .d1 {
            background-color: red;
        }
        .d2 {
            background-color: yellow;
        }
        .d3 {
            background-color: blue;
        }
        .d4 {
            background-color: green;
        }
        h1 {
            align-self: center;
        }
        .container:hover .d1{
            transition: all 1s ease-in-out;
            transform: rotate(90deg);
            transform-origin: left top;
        }
        .container:hover .d2{
            transition: all 1s ease-in-out;
            transform: rotate(-90deg);
            transform-origin: right top;
        }
        .container:hover .d3{
            transition: all 1s ease-in-out;
            transform: rotate(-90deg);
            transform-origin: left bottom;
        }
        .container:hover .d4{
            transition: all 1s ease-in-out;
            transform: rotate(90deg);
            transform-origin: right bottom;
        }
    </style>
</head>
<body>
    <div class="tata">
        <div class="container">
            <div class="d1"></div>
            <div class="d2"></div>
            <div class="d3"></div>
            <div class="d4"></div>
        </div>
        <h1>Hi!</h1>
    </div>
</body>
</html>
