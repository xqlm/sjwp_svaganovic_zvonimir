<head>

    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 98dvh;

        button{
            animation: pulse 2s ease-in-out 0s infinite alternate;
        }
        @keyframes pulse{
            from{
                scale: 1;
            }
            to{
                scale: 2;
            }
            to{
                scale: 0.5;
            }
        }
    </style>
