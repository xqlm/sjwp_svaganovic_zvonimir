<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadatak 8</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 98dvh;
        }
        .okvir{
            width: 300px;
            height: 600px;
            background-color: #222222;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            flex-direction: column;
        }
        .krug{
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 10px solid black;
        }
        #d1{
            animation: f1 1s linear 1s 1 forwards;
        }
        #d2{
            animation: f2 1s linear 2s 1 forwards;
        }
        #d3{
            animation: f3 1s linear 3s 1 forwards;
        }
        @keyframes f1 {
            0%{
                background-color: #222222;
            }
            25%{
                background-color: red;
            }
            75%{
                background-color: red;
            }
            100%{
                background-color: #222222;
            }

        }
        @keyframes f2 {
            0%{
                background-color: #222222;
            }
            25%{
                background-color: yellow;
            }
            75%{
                background-color: yellow;
            }
            100%{
                background-color: #222222;
            }

        }
        @keyframes f3 {
            0%{
                background-color: #222222;
            }
            25%{
                background-color: green;
            }
            75%{
                background-color: green;
            }
            100%{
                background-color: #222222;
            }

        }
    </style>
</head>
<body>
    <div class="okvir">
        <div class="krug" id="d1"></div>
        <div class="krug" id="d2"></div>
        <div class="krug" id="d3"></div>
    </div>
</body>
</html>
