<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadatak 5</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 98dvh;
        }
        div{
            width: 200px;
            height: 200px;
            background-color: aqua;
            animation: rot 2s ease-in-out 0s 1 forwards;
            border-top: 2px solid black;
        }
        @keyframes rot {
            from{
                rotate: 0deg;
            }
            to{
                rotate: 360deg;
            }
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
