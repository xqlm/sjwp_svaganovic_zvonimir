<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadatak 4</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 98dvh;
        }
        .tata{
            width: 200px;
            height: 300px;
            background-color: lightblue;
            text-align: left;
            padding: 10px;
        }
        .tata:hover{
            animation: hov 0.5s ease-in-out 0s 1 forwards;
        }
        @keyframes hov {
            from{
                scale: 1;
                background-color: lightblue;
            }
            to{
                scale: 1.2;
                background-color: #89cff0;
                box-shadow: 0px 0px 30px -5px rgba(0,0,0,1);
            }
        }
    </style>
</head>
<body>
    <div class="tata">
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. 
           At, culpa recusandae reprehenderit eius, ex ad eligendi 
           veritatis suscipit sint porro illo architecto omnis cum, 
           sed enim aspernatur fuga non corporis!
        </p>
    </div>
</body>
</html>
