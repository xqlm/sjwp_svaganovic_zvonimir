<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zadatak 6</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 98dvh;
        }
        .load{
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 5px solid blueviolet;
            border-top: 5px solid white;
            animation: spin 2s linear infinite forwards;
        }
        @keyframes spin {
            0%{
                rotate: 0deg;
            }
            100%{
                rotate: 360deg;
            }
        }
    </style>
</head>
<body>
    <div class="load"></div>
</body>
</html>
