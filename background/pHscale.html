<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pH scale</title>
    <style>
        .p14 {
            background-color: rgb(53, 122, 175);
        }

        .p13 {
            background-color: rgb(54, 134, 185);        
        }

        .p12 {
            background-color: #3293c3;        
        }

        .p11 {
            background-color: #469fcb;        
        }

        .p10 {
            background-color: #5fadd2;        
        }

        .p9 {
            background-color: #75bada;        
        }

        .p8 {
            background-color: #8dc4df;        
        }

        .p7 {
            background-color: #23ab7e;    
        }

        .p6 {
           background-color: #e7abc1;        
        }

        .p5 {
            background-color: #e799b5;        
        }           
        .p4 {
            background-color: #e587a7;
        }

        .p3 {
            background-color: #e2749a;    
        }

        .p2 {
            background-color: #e0658a;      
        }

        .p1 {
            background-color: #db5580;    
        }

        .p0 {
            background-color: #da3d75;
        }
        p,h2 {
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            margin: 0;
            padding: 5px;
        }
        h2{
            color: #4e4e4e;
            background-color: #dfdfdf;
            margin-bottom: 15px;
        }
        div {
            background-color: #9e9e9e;
            padding: 20px;
        }
        span {
            font-size: xx-large;
        }
    </style>
</head>
<body>
    <div>
        <h2>pH Scale</h2>
        <p class="p14">14.0 VERY ALKALINE</p>
        <p class="p13">13.0</p>
        <p class="p12">12.0</p>
        <p class="p11">11.0</p>
        <p class="p10">10.0</p>
        <p class="p9">9.0</p>
        <p class="p8">8.0</p>
        <p class="p7">7.0 <span>NEUTRAL</span></p>
        <p class="p6">6.0</p>
        <p class="p5">5.0</p>
        <p class="p4">4.0</p>
        <p class="p3">3.0</p>
        <p class="p2">2.0</p>
        <p class="p1">1.0</p>
        <p class="p0">0.0 VERY ACIDIC</p>
    </div>
</body>
</html>
